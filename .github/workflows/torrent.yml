name: Download Torrent/Magnet & Upload to Hugging Face

on:
  workflow_dispatch:
    inputs:
      torrent_input:
        description: 'Enter torrent file URL, magnet link, base64 data, or gist URL'
        required: true
        type: string
      hf_upload:
        description: 'Upload to Hugging Face? (true/false)'
        required: false
        default: 'false'
        type: string
      hf_token:
        description: 'Hugging Face API token (required if upload=true)'
        required: false
        type: string
      hf_username:
        description: 'Hugging Face username or org name'
        required: false
        type: string
      hf_repo_name:
        description: 'Repository name on Hugging Face'
        required: false
        type: string
      hf_repo_type:
        description: 'Repository type (model, dataset, space)'
        required: false
        default: 'model'
        type: choice
        options:
          - model
          - dataset
          - space
      hf_private:
        description: 'Make repository private? (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 python3-pip git-lfs curl
          pip install --upgrade huggingface-hub

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download torrent/magnet
        run: |
          INPUT="${{ github.event.inputs.torrent_input }}"
          TARGET_FILE=""
          
          if [[ "$INPUT" == gist:* ]]; then
            echo "📁 Detected Gist URL bypass for large torrent. Downloading..."
            GIST_URL="${INPUT#gist:}"
            curl -s "$GIST_URL" | sed 's/^data:.*base64,//' | base64 --decode > local.torrent
            TARGET_FILE="local.torrent"
          elif [[ "$INPUT" == data:* ]]; then
            echo "📁 Detected inline base64 torrent file. Decoding..."
            echo "$INPUT" | sed 's/^data:.*base64,//' | base64 --decode > local.torrent
            TARGET_FILE="local.torrent"
          else
            echo "🔗 Detected standard URL or Magnet link."
            TARGET_FILE="$INPUT"
          fi
          
          echo "⏬ Starting performance-optimized download with aria2c..."
          aria2c --dir=./downloads \
                 --seed-time=0 \
                 --file-allocation=falloc \
                 --disk-cache=64M \
                 --bt-max-open-files=50 \
                 --summary-interval=15 \
                 --max-connection-per-server=16 \
                 --split=16 \
                 "$TARGET_FILE"
          
          echo "✅ Download completed"

      - name: List downloaded files
        run: |
          echo "📦 Downloaded files:"
          du -sh downloads/* || echo "No files"
          ls -lh downloads/

      - name: Validate Hugging Face inputs
        id: validate_hf
        run: |
          UPLOAD="${{ github.event.inputs.hf_upload }}"
          if [[ "$UPLOAD" == "true" ]]; then
            if [[ -z "${{ github.event.inputs.hf_token }}" ]]; then
              echo "❌ Error: HF token required for upload"
              exit 1
            fi
            if [[ -z "${{ github.event.inputs.hf_username }}" ]]; then
              echo "❌ Error: HF username required for upload"
              exit 1
            fi
            if [[ -z "${{ github.event.inputs.hf_repo_name }}" ]]; then
              echo "❌ Error: HF repo name required for upload"
              exit 1
            fi
            echo "should_upload=true" >> $GITHUB_OUTPUT
          else
            echo "should_upload=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Hugging Face
        if: steps.validate_hf.outputs.should_upload == 'true'
        env:
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
        run: |
          REPO_TYPE="${{ github.event.inputs.hf_repo_type }}"
          USERNAME="${{ github.event.inputs.hf_username }}"
          REPO_NAME="${{ github.event.inputs.hf_repo_name }}"
          PRIVATE="${{ github.event.inputs.hf_private }}"
          
          echo "🚀 Uploading to Hugging Face..."
          echo "  Repository: $USERNAME/$REPO_NAME"
          echo "  Type: $REPO_TYPE"
          echo "  Private: $PRIVATE"
          
          python3 << 'EOF'
          import os
          from huggingface_hub import HfApi
          
          api = HfApi()
          token = os.getenv("HF_TOKEN")
          repo_type = "${{ github.event.inputs.hf_repo_type }}"
          username = "${{ github.event.inputs.hf_username }}"
          repo_name = "${{ github.event.inputs.hf_repo_name }}"
          private = "${{ github.event.inputs.hf_private }}" == "true"
          
          repo_id = f"{username}/{repo_name}"
          
          # Remove aria2 control/meta files to prevent dirty repo uploads
          for root, dirs, files in os.walk("./downloads"):
              for file in files:
                  if file.endswith('.aria2') or file == 'local.torrent':
                      try:
                          os.remove(os.path.join(root, file))
                      except:
                          pass

          try:
            api.create_repo(
              repo_id=repo_id,
              repo_type=repo_type,
              private=private,
              exist_ok=True,
              token=token
            )
            print(f"✅ Repository ready: {repo_id}")
          except Exception as e:
            print(f"⚠️ Repo creation check: {e}")
          
          # Bulletproof folder upload strategy for massive monolithic datasets or models
          try:
            print(f"📤 Initializing bulk multi-part upload for folder ./downloads")
            api.upload_folder(
              folder_path="./downloads",
              repo_id=repo_id,
              repo_type=repo_type,
              token=token
            )
            print(f"✅ Successfully pushed files to Hugging Face: {repo_id}")
          except Exception as e:
            print(f"❌ Core multi-part upload handler failed: {e}")
            raise
          EOF

      - name: Create summary
        if: always()
        run: |
          echo "## ✅ Download & Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download Status:** ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Downloaded Files:**" >> $GITHUB_STEP_SUMMARY
          ls -lh downloads/ 2>/dev/null | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "- No files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          UPLOAD="${{ github.event.inputs.hf_upload }}"
          if [[ "$UPLOAD" == "true" ]]; then
            USERNAME="${{ github.event.inputs.hf_username }}"
            REPO_NAME="${{ github.event.inputs.hf_repo_name }}"
            echo "**Hugging Face Upload:** ✅ Uploaded to [$USERNAME/$REPO_NAME](https://huggingface.co/$USERNAME/$REPO_NAME)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Hugging Face Upload:** ⏸️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi
