name: Download Torrent/Magnet & Upload to Hugging Face

on:
  workflow_dispatch:
    inputs:
      torrent_input:
        description: 'Enter DIRECT FILE URL (Must be HTTP/HTTPS Web-Seed URL for 400GB streaming)'
        required: true
        type: string
      hf_upload:
        description: 'Upload to Hugging Face? (true/false)'
        required: false
        default: 'true'
        type: string
      hf_token:
        description: 'Hugging Face API token (required if upload=true)'
        required: false
        type: string
      hf_username:
        description: 'Hugging Face username or org name'
        required: false
        type: string
      hf_repo_name:
        description: 'Repository name on Hugging Face'
        required: false
        type: string
      hf_repo_type:
        description: 'Repository type (model, dataset, space)'
        required: false
        default: 'model'
        type: choice
        options:
          - model
          - dataset
          - space
      hf_private:
        description: 'Make repository private? (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git-lfs curl
          pip install --upgrade huggingface-hub requests

      - name: Validate Hugging Face inputs
        id: validate_hf
        run: |
          UPLOAD="${{ github.event.inputs.hf_upload }}"
          if [[ "$UPLOAD" == "true" ]]; then
            if [[ -z "${{ github.event.inputs.hf_token }}" ]]; then
              echo "❌ Error: HF token required for upload"
              exit 1
            fi
            if [[ -z "${{ github.event.inputs.hf_username }}" ]]; then
              echo "❌ Error: HF username required for upload"
              exit 1
            fi
            if [[ -z "${{ github.event.inputs.hf_repo_name }}" ]]; then
              echo "❌ Error: HF repo name required for upload"
              exit 1
            fi
            echo "should_upload=true" >> $GITHUB_OUTPUT
          else
            echo "should_upload=false" >> $GITHUB_OUTPUT
          fi

      - name: Execute Live Streaming Pipeline to Hugging Face
        if: steps.validate_hf.outputs.should_upload == 'true'
        env:
          HF_TOKEN: ${{ github.event.inputs.hf_token }}
        run: |
          REPO_TYPE="${{ github.event.inputs.hf_repo_type }}"
          USERNAME="${{ github.event.inputs.hf_username }}"
          REPO_NAME="${{ github.event.inputs.hf_repo_name }}"
          PRIVATE="${{ github.event.inputs.hf_private }}"
          SOURCE_URL="${{ github.event.inputs.torrent_input }}"
          
          echo "🚀 Initiating Streaming Middleman Pipeline..."
          echo "  Source URL: $SOURCE_URL"
          echo "  Target Repository: $USERNAME/$REPO_NAME"
          
          python3 << 'EOF'
          import os
          import sys
          import requests
          from huggingface_hub import HfApi
          
          api = HfApi()
          token = os.getenv("HF_TOKEN")
          source_url = os.getenv("SOURCE_URL")
          repo_type = "${{ github.event.inputs.hf_repo_type }}"
          username = "${{ github.event.inputs.hf_username }}"
          repo_name = "${{ github.event.inputs.hf_repo_name }}"
          private = "${{ github.event.inputs.hf_private }}" == "true"
          
          # Extract target filename from URL
          file_name = source_url.split("/")[-1].split("?")[0]
          if not file_name or "." not in file_name:
              file_name = "streamed_model.bin"
              
          repo_id = f"{username}/{repo_name}"
          
          # Create repo if it doesn't exist
          try:
            api.create_repo(
              repo_id=repo_id,
              repo_type=repo_type,
              private=private,
              exist_ok=True,
              token=token
            )
            print(f"✅ Repository ready: {repo_id}")
          except Exception as e:
            print(f"⚠️ Repo creation/verification note: {e}")
          
          # Establish the live network memory stream
          print(f"📡 Opening stream connection to: {source_url}")
          try:
              with requests.get(source_url, stream=True, timeout=60) as response:
                  response.raise_for_status()
                  
                  # Generator function feeds 10MB blocks sequentially through RAM buffer
                  def chunk_generator():
                      total_bytes = 0
                      for chunk in response.iter_content(chunk_size=1024 * 1024 * 10): 
                          if chunk:
                              total_bytes += len(chunk)
                              # Simple progress heartbeat logging to terminal
                              if total_bytes % (1024 * 1024 * 500) == 0:
                                  print(f"🔄 Streamed {total_bytes / (1024*1024*1024):.2f} GB through RAM...")
                              yield chunk

                  print(f"📤 Uploading file '{file_name}' to {repo_id} without writing to local disk...")
                  api.upload_file(
                      path_or_fileobj=chunk_generator(),
                      path_in_repo=file_name,
                      repo_id=repo_id,
                      repo_type=repo_type,
                      token=token
                  )
                  print(f"✅ Successfully streamed and uploaded: {file_name}")
          except Exception as e:
              print(f"❌ Streaming pipeline failed: {e}")
              sys.exit(1)
          EOF

      - name: Create summary
        if: always()
        run: |
          echo "## ✅ Streaming Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          UPLOAD="${{ github.event.inputs.hf_upload }}"
          if [[ "$UPLOAD" == "true" ]]; then
            USERNAME="${{ github.event.inputs.hf_username }}"
            REPO_NAME="${{ github.event.inputs.hf_repo_name }}"
            echo "**Hugging Face Status:** Live stream completed to [$USERNAME/$REPO_NAME](https://huggingface.co/$USERNAME/$REPO_NAME)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Hugging Face Status:** ⏸️ Script execution bypassed" >> $GITHUB_STEP_SUMMARY
          fi
