name: Download Torrent or Magnet

on:
  workflow_dispatch:
    inputs:
      torrent_input:
        description: 'Enter torrent file URL or magnet link'
        required: true
        type: string
      max_connections:
        description: 'Max connections per server'
        required: false
        default: '10'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download via aria2c (NO SEEDING)
        run: |
          aria2c \
            "${{ github.event.inputs.torrent_input }}" \
            --dir=./downloads \
            --max-connection-per-server=${{ github.event.inputs.max_connections }} \
            --split=10 \
            --continue=true \
            --max-tries=5 \
            --retry-wait=3 \
            -x 10 \
            --bt-stop-timeout=0 \
            --seed-time=0 \
            --bt-seed-uncontrolled=false \
            --bt-max-peers=50 \
            --disable-ipv6 \
            --no-conf

      - name: List downloaded files
        run: |
          echo "📦 Downloaded files:"
          ls -lh downloads/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-content
          path: downloads/
          retention-days: 30

      - name: Create summary
        if: always()
        run: |
          echo "## ✅ Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Downloaded File:**" >> $GITHUB_STEP_SUMMARY
          ls -lh downloads/ | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "- No files downloaded" >> $GITHUB_STEP_SUMMARY
