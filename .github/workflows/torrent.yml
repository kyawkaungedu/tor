name: Download Torrent or Magnet

on:
  workflow_dispatch:
    inputs:
      torrent_input:
        description: 'Enter torrent file URL or magnet link'
        required: true
        type: string
      max_connections:
        description: 'Max connections per server'
        required: false
        default: '10'
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download via aria2c with timeout
        run: |
          timeout 600 aria2c \
            "${{ github.event.inputs.torrent_input }}" \
            --dir=./downloads \
            --max-connection-per-server=${{ github.event.inputs.max_connections }} \
            --split=10 \
            --continue=true \
            --max-tries=5 \
            --retry-wait=3 \
            -x 10 \
            --bt-stop-timeout=5 \
            --seed-time=0 \
            --bt-max-peers=100 \
            --disable-ipv6 \
            --no-conf \
            --file-allocation=none || echo "Download completed or timed out"

      - name: List downloaded files
        run: |
          echo "📦 Downloaded files:"
          ls -lh downloads/ 2>/dev/null || echo "No files found"
          du -sh downloads/ 2>/dev/null || echo "Directory empty"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-content
          path: downloads/
          retention-days: 30

      - name: Create summary
        if: always()
        run: |
          echo "## ✅ Download Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Download finished or timed out after 10 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Downloaded Content:**" >> $GITHUB_STEP_SUMMARY
          ls -lh downloads/ 2>/dev/null | tail -n +2 | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "- No files available" >> $GITHUB_STEP_SUMMARY
